<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>001: WebRTC URL Signaling Spike</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    height: 100vh;
  }
  .panel {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    border-right: 1px solid #21262d;
  }
  .panel:last-child { border-right: none; }
  h2 { font-size: 18px; }
  .status {
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    display: inline-block;
  }
  .status.disconnected { background: #21262d; color: #8b949e; }
  .status.connecting { background: #1f2a37; color: #58a6ff; }
  .status.connected { background: #0d3324; color: #3fb950; }
  .status.error { background: #3d1418; color: #f85149; }

  .url-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px;
    font-family: monospace;
    font-size: 11px;
    word-break: break-all;
    max-height: 90px;
    overflow-y: auto;
    color: #7ee787;
    line-height: 1.4;
  }
  .url-box.empty { color: #484f58; }

  .url-input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px;
    color: #c9d1d9;
    font-family: monospace;
    font-size: 12px;
  }
  .url-input:disabled { opacity: 0.4; }

  button {
    background: #238636;
    color: white;
    border: 1px solid #2ea043;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-row { display: flex; gap: 8px; align-items: center; }

  .log {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
    min-height: 0;
  }
  .log .entry { padding: 2px 0; }
  .log .sent { color: #58a6ff; }
  .log .received { color: #3fb950; }
  .log .system { color: #8b949e; }

  .msg-row { display: flex; gap: 8px; }
  .msg-row input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 12px;
    color: #c9d1d9;
    font-size: 14px;
  }
  .url-size { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .section-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
</style>
</head>
<body>

<!-- HOST PANEL -->
<div class="panel">
  <div>
    <h2>🖥️ Host</h2>
    <span class="status disconnected" id="host-status">disconnected</span>
  </div>

  <div>
    <button onclick="hostCreateRoom()" id="host-create-btn">Create Room</button>
  </div>

  <div>
    <div class="section-label">Offer URL (copy + share w/ peer)</div>
    <div class="url-box empty" id="host-offer-url">Click "Create Room" to generate</div>
    <div class="url-size" id="host-offer-size"></div>
  </div>

  <div>
    <div class="section-label">Paste Peer's Answer URL</div>
    <div class="btn-row">
      <input class="url-input" id="host-answer-input" placeholder="Paste answer URL here...">
      <button onclick="hostApplyAnswer()" id="host-answer-btn" disabled>Apply</button>
    </div>
  </div>

  <div class="msg-row">
    <input id="host-msg-input" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter')hostSend()">
    <button onclick="hostSend()" id="host-send-btn" disabled>Send</button>
  </div>

  <div class="log" id="host-log">
    <div class="entry system">Click "Create Room" to start</div>
  </div>
</div>

<!-- PEER PANEL -->
<div class="panel">
  <div>
    <h2>👤 Peer</h2>
    <span class="status disconnected" id="peer-status">disconnected</span>
  </div>

  <div>
    <div class="section-label">Paste Host's Offer URL</div>
    <div class="btn-row">
      <input class="url-input" id="peer-offer-input" placeholder="Paste offer URL here...">
      <button onclick="peerJoin()" id="peer-join-btn">Join</button>
    </div>
  </div>

  <div>
    <div class="section-label">Answer URL (copy + paste in Host panel)</div>
    <div class="url-box empty" id="peer-answer-url">Will appear after Join</div>
    <div class="url-size" id="peer-answer-size"></div>
  </div>

  <div class="msg-row">
    <input id="peer-msg-input" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter')peerSend()">
    <button onclick="peerSend()" id="peer-send-btn" disabled>Send</button>
  </div>

  <div class="log" id="peer-log">
    <div class="entry system">Paste host's offer URL and click Join</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
<script>
let hostPeer = null;
let peerPeer = null;

function $(id) { return document.getElementById(id); }

function log(panel, type, text) {
  const el = $(`${panel}-log`);
  el.innerHTML += `<div class="entry ${type}">[${new Date().toLocaleTimeString()}] ${text}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(panel, cls, text) {
  const el = $(`${panel}-status`);
  el.className = `status ${cls}`;
  el.textContent = text;
}

function enableMsg(panel, enabled) {
  $(`${panel}-msg-input`).disabled = !enabled;
  $(`${panel}-send-btn`).disabled = !enabled;
}

// ── URL encoding ──────────────────────
function encodeSignal(signalData) {
  const json = JSON.stringify(signalData);
  const encoded = btoa(json);
  const url = window.location.href.split('#')[0] + '#sdp=' + encoded;
  return { url, sizeKB: (encoded.length / 1024).toFixed(1) };
}

function decodeSignal(url) {
  try {
    const fragment = url.includes('#sdp=') ? url.split('#sdp=')[1] : url;
    const json = atob(fragment);
    const parsed = JSON.parse(json);
    if (!parsed || (!parsed.sdp && !parsed.candidate && parsed.type !== 'answer')) {
      // might just be a candidate
    }
    return parsed;
  } catch (e) {
    return null;
  }
}

// ── Peer factory ──────────────────────
function createPeer(initiator, label, onSignal, onConnect, onData, onErr) {
  const p = new SimplePeer({
    initiator,
    trickle: false, // bundle candidates in one shot — one URL exchange
  });

  p.on('signal', data => {
    console.log(`${label} signal:`, data.type || 'bundled');
    onSignal(data);
  });

  p.on('connect', () => {
    console.log(`${label} connected`);
    onConnect();
  });

  p.on('data', data => {
    const text = new TextDecoder().decode(data);
    console.log(`${label} data:`, text);
    onData(text);
  });

  p.on('error', err => {
    console.error(`${label} error:`, err);
    onErr(err);
  });

  p.on('close', () => console.log(`${label} closed`));

  return p;
}

// ── HOST ──────────────────────────────
function hostCreateRoom() {
  log('host', 'system', 'Creating room (trickle=off, bundled ICE)...');
  setStatus('host', 'connecting', 'generating offer');
  $('host-create-btn').disabled = true;

  hostPeer = createPeer(
    true, 'HOST',
    (data) => {
      const { url, sizeKB } = encodeSignal(data);
      $('host-offer-url').textContent = url;
      $('host-offer-url').classList.remove('empty');
      $('host-offer-size').textContent = `URL segment: ${sizeKB} KB`;
      log('host', 'system', `Offer generated (${sizeKB} KB)`);
      log('host', 'system', 'Copy the Offer URL and paste in Peer panel');
      setStatus('host', 'connecting', 'waiting for answer');
      $('host-answer-btn').disabled = false;
    },
    () => {
      setStatus('host', 'connected', 'connected');
      log('host', 'system', '🎉 Connection established!');
      enableMsg('host', true);
    },
    (txt) => log('host', 'received', `Peer: ${txt}`),
    (err) => {
      setStatus('host', 'error', 'error');
      log('host', 'system', `ERROR: ${err.message}`);
    }
  );
}

function hostApplyAnswer() {
  const raw = $('host-answer-input').value.trim();
  if (!raw) return;
  const signalData = decodeSignal(raw);
  if (!signalData) {
    log('host', 'system', 'ERROR: Could not decode answer URL');
    return;
  }
  log('host', 'system', 'Applying answer signal...');
  hostPeer.signal(signalData);
  $('host-answer-btn').disabled = true;
  $('host-answer-input').disabled = true;
  setStatus('host', 'connecting', 'connecting...');
}

function hostSend() {
  const input = $('host-msg-input');
  const text = input.value.trim();
  if (!text || !hostPeer || !hostPeer.connected) return;
  hostPeer.send(text);
  log('host', 'sent', `Me: ${text}`);
  input.value = '';
}

// ── PEER ──────────────────────────────
function peerJoin() {
  const raw = $('peer-offer-input').value.trim();
  if (!raw) return;
  const signalData = decodeSignal(raw);
  if (!signalData) {
    log('peer', 'system', 'ERROR: Could not decode offer URL');
    return;
  }
  log('peer', 'system', `Offer decoded (type: ${signalData.type || 'bundled'})`);
  setStatus('peer', 'connecting', 'creating peer...');
  $('peer-join-btn').disabled = true;
  $('peer-offer-input').disabled = true;

  peerPeer = createPeer(
    false, 'PEER',
    (data) => {
      const { url, sizeKB } = encodeSignal(data);
      $('peer-answer-url').textContent = url;
      $('peer-answer-url').classList.remove('empty');
      $('peer-answer-size').textContent = `URL segment: ${sizeKB} KB`;
      log('peer', 'system', `Answer generated (${sizeKB} KB)`);
      log('peer', 'system', 'Copy the Answer URL and paste in Host panel');
    },
    () => {
      setStatus('peer', 'connected', 'connected');
      log('peer', 'system', '🎉 Connection established!');
      enableMsg('peer', true);
    },
    (txt) => log('peer', 'received', `Host: ${txt}`),
    (err) => {
      setStatus('peer', 'error', 'error');
      log('peer', 'system', `ERROR: ${err.message}`);
    }
  );

  peerPeer.signal(signalData);
  log('peer', 'system', 'Processing offer...');
}

function peerSend() {
  const input = $('peer-msg-input');
  const text = input.value.trim();
  if (!text || !peerPeer || !peerPeer.connected) return;
  peerPeer.send(text);
  log('peer', 'sent', `Me: ${text}`);
  input.value = '';
}
</script>
</body>
</html>
