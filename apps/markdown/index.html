<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p2p-collab</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<!-- HOST PANEL -->
<div class="panel">
  <div>
    <h2>🖥️ Host</h2>
    <span class="status disconnected" id="host-status">disconnected</span>
  </div>

  <div>
    <button id="host-create-btn">Create Room</button>
  </div>

  <div>
    <div class="section-label">Share this URL with peer</div>
    <div class="url-box empty" id="host-offer-url">Click "Create Room" to generate</div>
    <div class="url-size" id="host-offer-size"></div>
  </div>

  <div class="msg-row">
    <input id="host-msg-input" placeholder="Type a message..." disabled>
    <button id="host-send-btn" disabled>Send</button>
  </div>

  <div class="log" id="host-log">
    <div class="entry system">Click "Create Room" to start</div>
  </div>
</div>

<!-- PEER PANEL -->
<div class="panel">
  <div>
    <h2>👤 Peer</h2>
    <span class="status disconnected" id="peer-status">disconnected</span>
  </div>

  <div>
    <div class="section-label">Open the host's URL or paste it here</div>
    <input class="url-input" id="peer-offer-input" placeholder="Opening URL automatically...">
    <div style="margin-top:6px;">
      <button id="peer-join-btn">Join Manually</button>
    </div>
  </div>

  <div class="msg-row">
    <input id="peer-msg-input" placeholder="Type a message..." disabled>
    <button id="peer-send-btn" disabled>Send</button>
  </div>

  <div class="log" id="peer-log">
    <div class="entry system">Open a host URL to join automatically</div>
  </div>
</div>

<!-- COLLABORATIVE EDITOR SECTION -->
<div id="editor-section" style="display:none;">
  <div style="padding: 12px 24px; border-top: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center;">
    <h2 style="font-size: 18px; margin: 0;">📝 Collaborative Markdown</h2>
    <div class="btn-row">
      <button id="open-file-btn" disabled>📂 Open File</button>
      <button id="save-file-btn" disabled>💾 Save</button>
    </div>
  </div>
  <div id="editor" style="height: 400px; border-top: 1px solid #21262d;">
    <textarea id="editor-textarea" disabled style="width:100%;height:100%;background:#0d1117;color:#c9d1d9;border:none;padding:12px;font-family:monospace;font-size:14px;resize:none;" placeholder="Connected — start typing..."></textarea>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
